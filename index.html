<!DOCTYPE html><html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>अनसुलझा कवि - Ultimate++</title><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Devanagari:wght@400;700&display=swap" rel="stylesheet"><style>
body{margin:0;font-family:'Noto Serif Devanagari',serif;background:white;color:black}
header{text-align:center;padding:60px 20px}
h1{font-size:52px}
nav{display:flex;justify-content:center;gap:20px;background:#f5f5f5;padding:15px;position:sticky;top:0}
nav a{text-decoration:none;color:black;font-weight:bold}
section{max-width:800px;margin:auto;padding:40px 20px}
input,textarea{width:100%;padding:10px;margin:10px 0;border:1px solid #ccc}
button{padding:8px 15px;background:black;color:white;border:none;cursor:pointer;margin-top:5px}
.post{border-bottom:1px solid #ccc;padding:15px 0}
.date{font-size:12px;color:gray}
#panel{display:none}
.like{margin-top:10px}
.comment-box{margin-top:10px}
</style></head>
<body><header>
<h1>अनसुलझा कवि</h1>
<p>"आत्मा की डोर को पल-पल कलम से जोड़ कर ,<br>लिखता चला जाता कहीं,सबकुछ कहीं पर छोड़कर।।"</p>
</header><nav>
<a href="#poems">Poems</a>
<a href="#login">Login</a>
</nav><section id="poems">
<h2>Poems</h2>
<div id="poemList"></div>
</section><section id="login">
<h2>Admin Login</h2>
<input type="password" id="password" placeholder="Enter password">
<button onclick="login()">Login</button>
</section><section id="panel">
<h2>Poet Panel</h2>
<input type="text" id="title" placeholder="Title">
<textarea id="content" placeholder="Write your poem..."></textarea>
<button onclick="addPost()">Publish</button>
</section><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script><script>
// 🔴 Replace this with your Firebase config
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const ADMIN_PASS = "nitin123";

function login(){
  let pass=document.getElementById("password").value;
  if(pass===ADMIN_PASS){
    document.getElementById("panel").style.display="block";
    alert("Login success");
  } else alert("Wrong password");
}

function addPost(){
  let title=document.getElementById("title").value;
  let content=document.getElementById("content").value;

  if(!title||!content){alert("Fill all fields");return;}

  let post={title,content,date:new Date().toLocaleString(),likes:0};

  db.ref("poems").push(post);

  document.getElementById("title").value="";
  document.getElementById("content").value="";
}

function likePost(id){
  let ref=db.ref("poems/"+id+"/likes");
  ref.transaction(n=>(n||0)+1);
}

function addComment(id){
  let name=document.getElementById("name-"+id).value;
  let text=document.getElementById("comment-"+id).value;

  if(!name||!text){alert("Fill all");return;}

  db.ref("poems/"+id+"/comments").push({name,text});
}

function loadPosts(){
  db.ref("poems").on("value",snap=>{
    let list=document.getElementById("poemList");
    list.innerHTML="";

    snap.forEach(child=>{
      let p=child.val();
      let id=child.key;

      let div=document.createElement("div");
      div.className="post";

      let commentsHTML="";
      if(p.comments){
        Object.values(p.comments).forEach(c=>{
          commentsHTML+=`<p><b>${c.name}:</b> ${c.text}</p>`;
        });
      }

      div.innerHTML=`
        <h3>${p.title}</h3>
        <div class="date">${p.date}</div>
        <p>${p.content}</p>

        <div class="like">
          <button onclick="likePost('${id}')">❤️ Like</button>
          <span>${p.likes||0}</span>
        </div>

        <div class="comment-box">
          <input id="name-${id}" placeholder="Your name">
          <input id="comment-${id}" placeholder="Write comment">
          <button onclick="addComment('${id}')">Comment</button>
          <div>${commentsHTML}</div>
        </div>
      `;

      list.prepend(div);
    });
  });
}

// Visitor Counter
let visitRef=db.ref("visits");
visitRef.transaction(n=>(n||0)+1);
visitRef.on("value",snap=>{
  document.body.insertAdjacentHTML("beforeend",
    `<p style='text-align:center'>Visitors: ${snap.val()}</p>`);
});

loadPosts();
</script></body>
</html>
